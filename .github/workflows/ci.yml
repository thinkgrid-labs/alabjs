name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  RUST_BACKTRACE: 1
  TURBO_TELEMETRY_DISABLED: 1

jobs:
  # ─── Rust tests ───────────────────────────────────────────────────────────
  rust-test:
    name: Rust tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust deps
        uses: Swatinem/rust-cache@v2

      - name: cargo test
        run: cargo test --workspace

  # ─── TypeScript typecheck ─────────────────────────────────────────────────
  ts-typecheck:
    name: TypeScript typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck

  # ─── napi cross-compile ───────────────────────────────────────────────────
  napi-build:
    name: Build napi binary (${{ matrix.settings.target }})
    runs-on: ${{ matrix.settings.host }}
    strategy:
      fail-fast: false
      matrix:
        settings:
          - host: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            build: cargo build --release --target x86_64-unknown-linux-gnu -p alab-napi
          - host: macos-latest
            target: aarch64-apple-darwin
            build: cargo build --release --target aarch64-apple-darwin -p alab-napi
          - host: macos-latest
            target: x86_64-apple-darwin
            build: cargo build --release --target x86_64-apple-darwin -p alab-napi
          - host: windows-latest
            target: x86_64-pc-windows-msvc
            build: cargo build --release --target x86_64-pc-windows-msvc -p alab-napi
          - host: ubuntu-latest
            target: x86_64-unknown-linux-musl
            build: cargo build --release --target x86_64-unknown-linux-musl -p alab-napi

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.settings.target }}

      - name: Cache Rust deps
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.settings.target }}

      - name: Build
        run: ${{ matrix.settings.build }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: alab-napi-${{ matrix.settings.target }}
          path: target/${{ matrix.settings.target }}/release/libalab_napi.*

  # ─── Example smoke test ───────────────────────────────────────────────────
  example-build:
    name: Example build smoke test
    runs-on: ubuntu-latest
    needs: [rust-test, ts-typecheck]
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust deps
        uses: Swatinem/rust-cache@v2

      - run: pnpm install --frozen-lockfile
      - run: cargo build --release -p alab-napi
      - run: node scripts/copy-napi-binary.mjs
      - run: pnpm run build:packages
      - run: pnpm install --frozen-lockfile
      - run: pnpm build

  # ─── E2E tests (Playwright) ───────────────────────────────────────────────
  e2e:
    name: E2E tests
    runs-on: ubuntu-latest
    needs: [example-build]
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust deps
        uses: Swatinem/rust-cache@v2

      - run: pnpm install --frozen-lockfile
      - run: cargo build --release -p alab-napi
      - run: node scripts/copy-napi-binary.mjs
      - run: pnpm run build:packages
      - run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm --filter alabjs-e2e exec playwright install chromium --with-deps

      # Only runs the production project:
      #   - Skips the dev web server (cold-compiles Rust+TS, too slow for CI).
      #   - The production webServer command chains `alab build && alab start`,
      #     so the example is always built before the server binds the port.
      - name: Run E2E tests (production project)
        run: pnpm --filter alabjs-e2e test:production
        env:
          CI: true

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: e2e/playwright-report/
          retention-days: 7

  # ─── Windows compatibility ────────────────────────────────────────────────
  windows-compat:
    name: Windows compatibility
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust deps
        uses: Swatinem/rust-cache@v2
        with:
          key: windows-x86_64

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build napi binary (Windows)
        run: cargo build --release -p alab-napi

      - name: Copy napi binary
        run: node scripts/copy-napi-binary.mjs

      - name: Build packages
        run: pnpm run build:packages

      - name: Re-install (picks up built packages)
        run: pnpm install --frozen-lockfile

      - name: TypeScript typecheck
        run: pnpm typecheck

      - name: Unit tests
        run: pnpm --filter alabjs test && pnpm --filter alabjs-vite-plugin test

      - name: Build examples (smoke test)
        run: pnpm build
